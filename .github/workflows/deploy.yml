name: Deploy to AWS Lambda

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggers

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda bundle
        run: npm run build:lambda

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy to Lambda
        run: npx serverless deploy --region ap-south-1 --verbose
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          DAILY_SPEND_LIMIT_CENTS: ${{ secrets.DAILY_SPEND_LIMIT_CENTS || '5000' }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o' }}
          OPENAI_REPORT_MODEL: ${{ secrets.OPENAI_REPORT_MODEL || 'gpt-4o' }}
          OPENAI_RESEARCH_MODEL: ${{ secrets.OPENAI_RESEARCH_MODEL || 'gpt-4o' }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'info' }}

      - name: Run health check
        run: |
          echo "Waiting 25s for Lambda to be ready after deploy..."
          sleep 25
          url="https://kl5z1i0tdg.execute-api.ap-south-1.amazonaws.com/health"
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5..."
            out=$(curl -s -w "\n%{http_code}" --max-time 15 "$url" || true)
            code=$(echo "$out" | tail -n1)
            body=$(echo "$out" | sed '$d')
            if [ "$code" = "200" ] && echo "$body" | grep -q '"status":"ok"'; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "  Response ($code): $body"
            [ $i -lt 5 ] && echo "Retrying in 10s..." && sleep 10
          done
          echo "❌ Health check failed after 5 attempts. Check Lambda logs in CloudWatch for startup errors."
          exit 1