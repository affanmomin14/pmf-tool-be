name: Deploy to AWS Lambda

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggers

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda bundle
        run: npm run build:lambda

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy to Lambda
        run: npx serverless deploy --region ap-south-1 --verbose
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          DAILY_SPEND_LIMIT_CENTS: ${{ secrets.DAILY_SPEND_LIMIT_CENTS }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_REPORT_MODEL: ${{ secrets.OPENAI_REPORT_MODEL }}
          OPENAI_RESEARCH_MODEL: ${{ secrets.OPENAI_RESEARCH_MODEL }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}

      - name: Run health check
        run: |
          sleep 10  # Wait for deployment to be ready
          curl -f https://kl5z1i0tdg.execute-api.ap-south-1.amazonaws.com/health || exit 1
          echo "✅ Health check passed"